# Test: grouped bar chart - avg monthly revenue by region, 2022 vs 2023 (multi-table: sales + stores)
# Benchmark index: 4
# Prompt: "Compare average monthly revenue between store regions for 2022 and 2023"
agent:
  model: "gpt-4o-mini"
  provider: "openai"
  openai_api_key: null

steps:
  decide_tool:
    n: 1
    use_cache: false

  lookup_sales_data:
    n: 3
    bon_param: "temperature"
    temp_min: 0.1
    temp_max: 0.5
    max_tokens: 2000
    use_cache: false
    eval: "default"

  analyzing_data:
    n: 1
    temp_min: 0.1
    max_tokens: 3000
    use_cache: false
    eval: "default"

  create_visualization:
    n: 3
    bon_param: "temperature"
    temp_min: 0.1
    temp_max: 0.7
    max_tokens: 2000
    use_cache: false
    eval: "default"

schema:
  data_dir: "../data"

# Ground truth caricata da benchmark_dataset.json (index=4)
# Tabelle coinvolte: sales JOIN stores ON Store_Number
# GT include: gt_data (CSV), gt_analysis, gt_chart_config, gt_chart_code
ground_truth:
  benchmark_path: "../evaluation/benchmark_dataset.json"
  index: 4

run:
  prompt: "Compare average monthly revenue between store regions for 2022 and 2023"
  visualization_goal: "Grouped bar chart comparing average monthly revenue per region between 2022 and 2023"
  agent_mode: "full"
  run_id: "test_region_revenue_grouped_bar"
  save_results: false
  save_dir: "./runs/test_region_revenue_grouped_bar"
  enable_codecarbon: true
