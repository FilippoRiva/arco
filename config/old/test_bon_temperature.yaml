# Test: best-of-n varying TEMPERATURE su tutti gli step (comportamento originale)
agent:
  model: "gpt-4o-mini"
  provider: "openai"
  openai_api_key: null

steps:
  decide_tool:
    n: 1
    use_cache: false

  lookup_sales_data:
    n: 3
    bon_param: "temperature"
    temp_min: 0.1
    temp_max: 0.7
    max_tokens: 2000
    use_cache: false
    eval: "default"

  analyzing_data:
    n: 3
    bon_param: "temperature"
    temp_min: 0.1
    temp_max: 0.9
    max_tokens: 3000
    use_cache: false
    eval: "default"

  create_visualization:
    n: 3
    bon_param: "temperature"
    temp_min: 0.1
    temp_max: 0.5
    max_tokens: 2000
    use_cache: false
    eval: "default"

schema:
  data_dir: "../data"

run:
  prompt: "Show me the sales in Nov 2021"
  visualization_goal: "Sales trend for Nov 2021, with date as x and sales value as y"
  agent_mode: "full"
  run_id: "test_bon_temperature"
  save_results: false
  save_dir: "./runs/test_bon_temperature"
  enable_codecarbon: true
