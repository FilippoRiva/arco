# Test 2: bar chart con SINGOLO asse y
# Goal: verificare che y_axis (stringa) funzioni ancora correttamente dopo la modifica
agent:
  model: "gpt-4o-mini"
  provider: "openai"
  openai_api_key: null

steps:
  decide_tool:
    n: 1
    use_cache: false

  lookup_sales_data:
    n: 3
    bon_param: "temperature"
    temp_min: 0.1
    temp_max: 0.5
    max_tokens: 2000
    use_cache: false
    eval: "default"

  analyzing_data:
    n: 1
    temp_min: 0.1
    max_tokens: 3000
    use_cache: false
    eval: "default"

  create_visualization:
    n: 3
    bon_param: "temperature"
    temp_min: 0.1
    temp_max: 0.7
    max_tokens: 2000
    use_cache: false
    eval: "default"

schema:
  data_dir: "../data"

run:
  prompt: >
    What is the total revenue generated by each product class in 2021?
    Rank them from highest to lowest.
  visualization_goal: >
    Bar chart showing total revenue by product class in 2021, sorted descending.
    Single metric on Y-axis: total revenue. X-axis: product class code.
  agent_mode: "full"
  run_id: "test_bar_single_y"
  save_results: false
  save_dir: "./runs/test_bar_single_y"
  enable_codecarbon: false
