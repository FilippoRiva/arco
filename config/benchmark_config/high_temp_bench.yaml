# yaml-language-server: $schema=./schema.json
global:
  schema: "../../data"
  orchestration_enabled: true
  enable_budget_controller: false
  provider: openai
  model: gpt-4.1-nano

defaults:
  Retriever:
    temp_min: 0.3 # SQL gen is extremely schematic
  Analyzer:
    temp_min: 1.3 # High temp to check perplexity
    max_tokens: 1000
  Visualizer:
    temp_min: 0.5 # Code and JSON generation is extremely schematic

runs:
  - name: bench_0
    description: first benchmark to change both retriever and analyzer
    changes:
      Retriever:
        temp_min: 0.5
        temp_max: 0.5
      Analyzer:
        temp_min: 0.5
        temp_max: 0.5
  - name: bench_1
    description: benchmark to test defaults
  - name: bench_2
    description: second benchmark to change visualizer a lot
    changes:
      Visualizer:
        temp_min: 0.8
        temp_max: 0.8
