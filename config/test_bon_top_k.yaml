# Test: best-of-n varying TOP_K su tutti gli step
# NB: OpenAI ignora top_k a livello API — i candidati vengono generati ma top_k non ha effetto
# bon_param diverso tra step: lookup=top_k, analyzing=temperature, create_vis=top_k
agent:
  model: "gpt-4o-mini"
  provider: "openai"
  openai_api_key: null

steps:
  decide_tool:
    n: 1
    use_cache: false

  lookup_sales_data:
    n: 3
    bon_param: "top_k"
    temp_min: 0.3         # temperatura fissa
    top_k_min: 20         # top_k iniziale (min)
    top_k_max: 60         # top_k finale (max)
    max_tokens: 2000
    use_cache: false
    eval: "default"

  analyzing_data:
    n: 3
    bon_param: "temperature"  # step diverso usa temperature
    temp_min: 0.1
    temp_max: 0.7
    max_tokens: 3000
    use_cache: false
    eval: "default"

  create_visualization:
    n: 3
    bon_param: "top_k"
    temp_min: 0.3         # temperatura fissa
    top_k_min: 15         # range più stretto per la visualizzazione
    top_k_max: 50
    max_tokens: 2000
    use_cache: false
    eval: "default"

schema:
  data_dir: "../data"

run:
  prompt: "Show me the sales in Nov 2021"
  visualization_goal: "Sales trend for Nov 2021, with date as x and sales value as y"
  agent_mode: "full"
  run_id: "test_bon_top_k"
  save_results: false
