# Test: bar chart - total revenue by brand for 2023 (multi-table: sales + products)
# Benchmark index: 3
# Prompt: "Show total revenue by product brand for 2023 as a bar chart"
agent:
  model: "gpt-4o-mini"
  provider: "openai"
  openai_api_key: null

steps:
  decide_tool:
    n: 1
    use_cache: false

  lookup_sales_data:
    n: 3
    bon_param: "temperature"
    temp_min: 0.1
    temp_max: 0.5
    max_tokens: 2000
    use_cache: false
    eval: "default"

  analyzing_data:
    n: 1
    temp_min: 0.1
    max_tokens: 3000
    use_cache: false
    eval: "default"

  create_visualization:
    n: 3
    bon_param: "temperature"
    temp_min: 0.1
    temp_max: 0.7
    max_tokens: 2000
    use_cache: false
    eval: "default"

schema:
  data_dir: "../data"

# Ground truth caricata da benchmark_dataset.json (index=3)
# Tabelle coinvolte: sales JOIN products ON SKU_Coded
# GT include: gt_data (CSV), gt_analysis, gt_chart_config, gt_chart_code
ground_truth:
  benchmark_path: "../evaluation/benchmark_dataset.json"
  index: 3

run:
  prompt: "Show total revenue by product brand for 2023 as a bar chart"
  visualization_goal: "Bar chart showing total revenue per brand for 2023, ordered from highest to lowest"
  agent_mode: "full"
  run_id: "test_brand_revenue_bar"
  save_results: false
  save_dir: "./runs/test_brand_revenue_bar"
  enable_codecarbon: true
