# =============================================================================
# RANDOM SEARCH SPACE
# =============================================================================
# Defines hyperparameter ranges for random search over AgentConfig.
# seed=42 is used globally for reproducibility.
#
# Per-parameter spec formats:
#   scalar value      → fixed (not varied across configs)
#   [a, b, c]         → discrete uniform choice from the list
#   {low: x, high: y} → continuous uniform sample in [x, y]
#   null              → Python None (disables the parameter)
#
# Dual-role parameters (bon_param controls which is the "varying" axis):
#   temp_min / temp_max — when bon_param=temperature: define the BoN range;
#                         when bon_param=top_p or top_k: temp_min is sampled
#                         as the single fixed temperature for all candidates.
#   top_p_min / top_p_max — when bon_param=top_p: define the BoN range;
#                           when bon_param=temperature or top_k: top_p_min is
#                           sampled as the single fixed top_p for all candidates.
#   top_k_min / top_k_max — when bon_param=top_k: define the BoN range;
#                           when bon_param=temperature or top_p: top_k_min is
#                           sampled as the single fixed top_k for all candidates.
#
# Provider gating:
#   bon_param        — OpenAI supports only "temperature" and "top_p".
#   bon_param_extra  — additional bon_param choices for non-OpenAI providers.
#   top_k_min/max, num_beams, no_repeat_ngram_size — sampled only for
#                    non-OpenAI providers; ignored by _create_llm for OpenAI.
# =============================================================================

global:
  seed: 42

# ---------------------------------------------------------------------------
# Default parameters for steps that are NOT being varied in a given phase.
# Each step has different characteristics that justify different defaults:
#
#   lookup_sales_data    — SQL generation: needs precision → low temp, moderate tokens
#   analyzing_data       — text analysis: needs coherence + nuance → mid temp, more tokens
#   create_visualization — code generation: needs exactness → low temp, generous tokens
# ---------------------------------------------------------------------------
defaults:
  Retriever:
    n: 1
    cot_n: 1
    bon_param: "temperature"
    temp_min: 0.1
    temp_max: 0.1
    top_p_min: 1.0
    top_p_max: 1.0
    max_tokens: 2000

  Analyzer:
    n: 1
    cot_n: 1
    bon_param: "temperature"
    temp_min: 0.3
    temp_max: 0.3
    top_p_min: 1.0
    top_p_max: 1.0
    max_tokens: 3000

  Visualizer:
    n: 1
    cot_n: 1
    bon_param: "temperature"
    temp_min: 0.1
    temp_max: 0.1
    top_p_min: 1.0
    top_p_max: 1.0
    max_tokens: 2000

# decide_tool is kept fixed (n=1, routing doesn't benefit from BoN)
steps:
  Retriever:
    # --- Universal parameters ---
    n: [1, 2, 3, 4]
    bon_param: ["temperature", "top_p"]
    cot_n: [1, 2, 3]
    temp_min: {low: 0.1, high: 0.3}
    temp_max: {low: 0.3, high: 1.0}
    top_p_min: {low: 0.7, high: 1.0}
    top_p_max: 1.0
    max_tokens: [1000, 1500, 2000, 3000]
    # --- Non-OpenAI only (Ollama / HuggingFace) ---
    bon_param_extra: ["top_k"]
    top_k_min: [null, 20, 40, 50]
    top_k_max: [50, 80, 100]
    num_beams: [1, 2]
    no_repeat_ngram_size: [null, 2, 3]

  Analyzer:
    # --- Universal parameters ---
    n: [1, 2, 3]
    bon_param: ["temperature", "top_p"]
    cot_n: [1, 2, 3]
    temp_min: {low: 0.1, high: 0.3}
    temp_max: {low: 0.3, high: 1.0}
    top_p_min: {low: 0.7, high: 1.0}
    top_p_max: 1.0
    max_tokens: [2000, 3000, 4000]
    # --- Non-OpenAI only ---
    bon_param_extra: ["top_k"]
    top_k_min: [null, 20, 40, 50]
    top_k_max: [50, 80, 100]
    num_beams: [1, 2]
    no_repeat_ngram_size: [null, 2, 3]

  Visualizer:
    # --- Universal parameters ---
    n: [1, 2, 3, 4]
    bon_param: ["temperature", "top_p"]
    cot_n: [1, 2, 3]
    temp_min: {low: 0.1, high: 0.2}
    temp_max: {low: 0.2, high: 0.8}
    top_p_min: {low: 0.7, high: 1.0}
    top_p_max: 1.0
    max_tokens: [1500, 2000, 3000]
    # --- Non-OpenAI only ---
    bon_param_extra: ["top_k"]
    top_k_min: [null, 20, 40, 50]
    top_k_max: [50, 80, 100]
    num_beams: [1, 2]
    no_repeat_ngram_size: [null, 2, 3]
