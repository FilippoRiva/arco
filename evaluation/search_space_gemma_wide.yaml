# =============================================================================
# WIDE RANDOM SEARCH SPACE FOR OLLAMA / GEMMA ABLATIONS
# =============================================================================
# Goal:
#   Explore a deliberately broad parameter range so performance degradation is
#   visible, rather than clustering around a narrow high-performing regime.
#
# Intended use:
#   python evaluation/bulk_runner.py evaluation/benchmark_dataset.json \
#     evaluation/search_space_gemma_wide.yaml \
#     --provider ollama --model gemma4:31b ...
# =============================================================================

global:
  seed: 42

defaults:
  lookup_sales_data:
    n: 1
    cot_n: 1
    bon_param: "temperature"
    temp_min: 1.0
    temp_max: 1.0
    top_p_min: 0.95
    top_p_max: 0.95
    top_k_min: 64
    top_k_max: 64
    max_tokens: 2000

  analyzing_data:
    n: 1
    cot_n: 1
    bon_param: "temperature"
    temp_min: 1.0
    temp_max: 1.0
    top_p_min: 0.95
    top_p_max: 0.95
    top_k_min: 64
    top_k_max: 64
    max_tokens: 3000

  create_visualization:
    n: 1
    cot_n: 1
    bon_param: "temperature"
    temp_min: 1.0
    temp_max: 1.0
    top_p_min: 0.95
    top_p_max: 0.95
    top_k_min: 64
    top_k_max: 64
    max_tokens: 2000

steps:
  lookup_sales_data:
    n: [1, 2, 3, 4, 6]
    bon_param: ["temperature", "top_p"]
    bon_param_extra: ["top_k"]
    cot_n: [1, 2, 3]
    temp_min: {low: 0.0, high: 1.2}
    temp_max: {low: 0.2, high: 1.6}
    top_p_min: {low: 0.35, high: 1.0}
    top_p_max: 1.0
    top_k_min: [5, 10, 20, 40, 64, 96]
    top_k_max: [20, 40, 64, 96, 128]
    max_tokens: [600, 1000, 1500, 2000, 3000]
    num_beams: [1]
    no_repeat_ngram_size: [null, 2, 3, 4]

  analyzing_data:
    n: [1, 2, 3, 4, 6]
    bon_param: ["temperature", "top_p"]
    bon_param_extra: ["top_k"]
    cot_n: [1, 2, 3]
    temp_min: {low: 0.0, high: 1.3}
    temp_max: {low: 0.3, high: 1.8}
    top_p_min: {low: 0.30, high: 1.0}
    top_p_max: 1.0
    top_k_min: [5, 10, 20, 40, 64, 96]
    top_k_max: [20, 40, 64, 96, 128]
    max_tokens: [1200, 2000, 3000, 4000, 5000]
    num_beams: [1]
    no_repeat_ngram_size: [null, 2, 3, 4]

  create_visualization:
    n: [1, 2, 3, 4, 6]
    bon_param: ["temperature", "top_p"]
    bon_param_extra: ["top_k"]
    cot_n: [1, 2, 3]
    temp_min: {low: 0.0, high: 1.0}
    temp_max: {low: 0.2, high: 1.5}
    top_p_min: {low: 0.35, high: 1.0}
    top_p_max: 1.0
    top_k_min: [5, 10, 20, 40, 64, 96]
    top_k_max: [20, 40, 64, 96, 128]
    max_tokens: [1000, 1500, 2000, 3000, 4000]
    num_beams: [1]
    no_repeat_ngram_size: [null, 2, 3, 4]
