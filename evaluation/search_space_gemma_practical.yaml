# =============================================================================
# PRACTICAL RANDOM SEARCH SPACE FOR OLLAMA / GEMMA 4 31B
# =============================================================================
# Goal:
#   Run an overnight-sized ablation that proves the agent works and helps choose
#   a strong operating region, without intentionally creating pathological SQL
#   failures or truncation-heavy configurations.
#
# Intended use:
#   docker run --rm --network=host -e OLLAMA_HOST=http://localhost:11434 \
#     -v "$(pwd)/runs:/app/runs" data-agent \
#     evaluation/bulk_runner.py evaluation/benchmark_dataset.json \
#     evaluation/search_space_gemma_practical.yaml \
#     --provider ollama --model gemma4:31b --n-configs 4 \
#     --think-time 0 --no-codecarbon \
#     --save-dir runs/bulk_results_gemma4_practical_12h
# =============================================================================

global:
  seed: 42

defaults:
  lookup_sales_data:
    n: 1
    cot_n: 1
    bon_param: "temperature"
    temp_min: 1.0
    temp_max: 1.0
    top_p_min: 0.95
    top_p_max: 0.95
    top_k_min: 64
    top_k_max: 64
    max_tokens: 5000

  analyzing_data:
    n: 1
    cot_n: 1
    bon_param: "temperature"
    temp_min: 1.0
    temp_max: 1.0
    top_p_min: 0.95
    top_p_max: 0.95
    top_k_min: 64
    top_k_max: 64
    max_tokens: 7000

  create_visualization:
    n: 1
    cot_n: 1
    bon_param: "temperature"
    temp_min: 1.0
    temp_max: 1.0
    top_p_min: 0.95
    top_p_max: 0.95
    top_k_min: 64
    top_k_max: 64
    max_tokens: 7000

steps:
  lookup_sales_data:
    n: [1, 2, 3]
    cot_n: [1]
    bon_param: ["temperature", "top_p"]
    bon_param_extra: ["top_k"]
    temp_min: {low: 0.5, high: 0.9}
    temp_max: {low: 0.8, high: 1.2}
    top_p_min: {low: 0.80, high: 1.0}
    top_p_max: 1.0
    top_k_min: [40, 64, 96]
    top_k_max: [64, 96, 128]
    max_tokens: [4000, 5000]
    num_beams: [1]
    no_repeat_ngram_size: [null]

  analyzing_data:
    n: [1, 2]
    cot_n: [1, 2]
    bon_param: ["temperature", "top_p"]
    bon_param_extra: ["top_k"]
    temp_min: {low: 0.7, high: 1.1}
    temp_max: {low: 1.0, high: 1.4}
    top_p_min: {low: 0.80, high: 1.0}
    top_p_max: 1.0
    top_k_min: [40, 64, 96]
    top_k_max: [64, 96, 128]
    max_tokens: [5000, 7000]
    num_beams: [1]
    no_repeat_ngram_size: [null]

  create_visualization:
    n: [1, 2]
    cot_n: [1]
    bon_param: ["temperature", "top_p"]
    bon_param_extra: ["top_k"]
    temp_min: {low: 0.5, high: 0.9}
    temp_max: {low: 0.8, high: 1.2}
    top_p_min: {low: 0.80, high: 1.0}
    top_p_max: 1.0
    top_k_min: [40, 64, 96]
    top_k_max: [64, 96, 128]
    max_tokens: [5000, 7000]
    num_beams: [1]
    no_repeat_ngram_size: [null]
